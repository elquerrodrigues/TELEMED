<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#F5F3EF">
  <title>Avaliação TEA | Psiquiatria Especializada</title>
  <style>
    body {
      background-color: #F5F3EF;
      color: #1a1a1a;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      line-height: 1.6;
    }
    header {
      padding: 40px 10%;
      border-bottom: 1px solid #e0ddd5;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-weight: bold;
      letter-spacing: 2px;
      font-size: 1.2rem;
    }
    h1, h2 {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      color: #111;
    }
    .hero {
      padding: 120px 10%;
      max-width: 800px;
    }
    .hero h1 {
      font-size: 3.5rem;
      margin-bottom: 20px;
      line-height: 1.1;
    }
    .hero p {
      font-size: 1.2rem;
      color: #4a4a4a;
      margin-bottom: 50px;
      max-width: 600px;
    }
    .btn {
      display: inline-block;
      padding: 16px 32px;
      background-color: #1a1a1a;
      color: #F5F3EF;
      text-decoration: none;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 1.5px;
      transition: background-color 0.3s ease;
    }
    .btn:hover {
      background-color: #333;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">SEU LOGO</div>
    <div class="crm-info">CRM 00000 | RQE 0000</div>
  </header>

  <section class="hero">
    <h1>Avaliação Diagnóstica de TEA</h1>
    <p>Um processo psiquiátrico rigoroso, empático e resolutivo. Avaliação clínica completa e emissão de laudo técnico especializado no mesmo dia.</p>
    <a href="#" class="btn">Agendar Avaliação</a>
  </section>

</body>
</html>
